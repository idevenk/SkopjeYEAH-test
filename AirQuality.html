<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkopjeYeah - Air Quality</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="air-quality" class="top-bar">
        <div class="brand">
            <span class="brand-mark"><img src="logo.png"></span>
            <span class="brand-text">SkopjeYEAH</span>
        </div>
    </header>

    <div id="map"></div>

    <div class="aq-details" id="aqDetails">
        <h2>Tap a marker to show air quality</h2>
        <p>Select a location on the map to view AQI, PM2.5, PM10 and status details.</p>
    </div>

    <div id="aqPopup" class="aq-popup hidden">
        <div class="aq-popup-card full-width-card">
            <div class="sheet-handle"></div>
            <button class="close-modal" onclick="closeAqPopup()">×</button>
            <h3 id="aqPopupTitle">Air Quality Details</h3>
            <div class="aq-popup-summary">
                <div class="aq-value" id="aqPopupValue">--</div>
                <div>
                    <p id="aqPopupStatus" class="aq-popup-status">Loading...</p>
                    <p id="aqPopupUpdate" class="aq-popup-update"></p>
                </div>
            </div>
            <div class="aq-slider-wrapper">
                <input id="aqColorSlider" class="aq-color-slider" type="range" min="0" max="100" value="30" disabled />
                <div class="aq-slider-labels">
                    <span>Good</span>
                    <span>Moderate</span>
                    <span>Poor</span>
                </div>
            </div>
            <ul id="aqPopupList" class="aq-popup-list"></ul>
        </div>
    </div>

    <footer class="bottom-nav">
        <a href="index.html#home" class="nav-item"><span class="nav-icon"><img src="home_ico.png" alt="Home"></span><span>Home</span></a>
        <a href="AirQuality.html" class="nav-item active"><span class="nav-icon"><img src="air_quality_ico.png" alt="Air Quality"></span><span>Air Quality</span></a>
        <a href="Track.html" class="nav-item"><span class="nav-icon"><img src="track_ico.png" alt="Track"></span><span>Track</span></a>
        <a href="settings.html" class="nav-item"><span class="nav-icon"><img src="settings_ico.png" alt="Settings"></span><span>Settings</span></a>
    </footer>


    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const API_TOKEN = '920a3bd0416aa65f6fde1957372621a3a4013597';
            const map = L.map('map').setView([41.9981, 21.4254], 12);
            const detailsPanel = document.getElementById('aqDetails');

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            function getAqiStatus(aqi) {
                if (aqi <= 50) return 'Good';
                if (aqi <= 100) return 'Moderate';
                if (aqi <= 150) return 'Unhealthy for Sensitive Groups';
                if (aqi <= 200) return 'Unhealthy';
                if (aqi <= 300) return 'Very Unhealthy';
                return 'Hazardous';
            }

            function showLoading(message) {
                detailsPanel.innerHTML = `
                    <h2>Loading</h2>
                    <p>${message}</p>
                `;
            }

            function renderDetails(data) {
                const iaqi = data.data.iaqi || {};
                const components = [];
                const componentNames = {pm25: 'PM2.5', pm10: 'PM10', o3: 'O₃', no2: 'NO₂', so2: 'SO₂', co: 'CO'};

                Object.entries(componentNames).forEach(([key, label]) => {
                    if (iaqi[key]) {
                        components.push(`<li><strong>${label}:</strong> ${iaqi[key].v} ${key === 'co' ? 'mg/m³' : 'µg/m³'}</li>`);
                    }
                });

                detailsPanel.innerHTML = `
                    <h2>${data.data.city.name}</h2>
                    <div class="aq-summary">
                        <span class="aq-value">AQI: ${data.data.aqi}</span>
                        <span>${getAqiStatus(data.data.aqi)}</span>
                    </div>
                    <ul>${components.join('')}</ul>
                    <p><strong>Dominant pollutant:</strong> ${data.data.dominentpol || 'N/A'}</p>
                    <p>${data.data.attributions ? 'Source: ' + data.data.attributions.map(a => a.name).join(', ') : ''}</p>
                `;
            }

            function openAqPopup(data, title) {
                const iaqi = data.data.iaqi || {};
                const componentNames = {pm25: 'PM2.5', pm10: 'PM10', o3: 'O₃', no2: 'NO₂', so2: 'SO₂', co: 'CO'};
                const listItems = Object.entries(componentNames).map(([key,label]) => {
                    if (iaqi[key]) {
                        return `<li><strong>${label}:</strong> ${iaqi[key].v} ${key === 'co' ? 'mg/m³' : 'µg/m³'}</li>`;
                    }
                    return '';
                }).join('');

                document.getElementById('aqPopupTitle').textContent = title;
                document.getElementById('aqPopupValue').textContent = data.data.aqi || '--';
                document.getElementById('aqPopupStatus').textContent = getAqiStatus(data.data.aqi || 0);
                document.getElementById('aqPopupUpdate').textContent = `Updated: ${data.data.time?.s || 'now'}`;
                document.getElementById('aqPopupList').innerHTML = listItems;
                document.getElementById('aqPopup').classList.remove('hidden');
            }

            function closeAqPopup() {
                document.getElementById('aqPopup').classList.add('hidden');
            }

            async function loadStationDetails(uid, title) {
                showLoading(`Fetching live AQI details for ${title}...`);
                try {
                    const response = await fetch(`https://api.waqi.info/feed/@${uid}/?token=${API_TOKEN}`);
                    const json = await response.json();
                    if (json.status === 'ok') {
                        openAqPopup(json, title);
                    } else {
                        detailsPanel.innerHTML = `<h2>${title}</h2><p>Air quality details are unavailable.</p>`;
                        console.error('AQICN feed error', json);
                    }
                } catch (error) {
                    detailsPanel.innerHTML = `<h2>${title}</h2><p>Could not load air quality details.</p>`;
                    console.error('Fetch error', error);
                }
            }

            async function loadStations() {
                showLoading('Loading nearby AQI stations...');
                const bounds = '41.85,21.25,42.10,21.55';
                const url = `https://api.waqi.info/map/bounds?latlng=${bounds}&token=${API_TOKEN}`;
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const json = await response.json();
                    console.log('AQICN Response:', json);
                    
                    if (json.status !== 'ok' || !json.data) {
                        throw new Error(`Invalid station response: ${json.status}`);
                    }

                    detailsPanel.innerHTML = `<h2>Tap a station</h2><p>Click a map marker to view real AQI details.</p>`;

                    json.data.forEach(station => {
                        const aqi = station.aqi !== '-' ? Number(station.aqi) : null;
                        const marker = L.circleMarker([station.lat, station.lon], {
                            radius: 10,
                            fillColor: aqi === null ? '#999' : aqi > 100 ? '#d95f0e' : '#2a9d8f',
                            color: '#222',
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                                marker.bindPopup(`<strong>${station.station.name}</strong><br>AQI: ${station.aqi}`);
                        marker.on('click', () => loadStationDetails(station.uid, station.station.name));
                    });
                } catch (error) {
                    detailsPanel.innerHTML = `<h2>Error loading stations</h2><p>Real air quality data could not be retrieved. Check console.</p>`;
                    console.error('AQICN error', error);
                }
            }

            loadStations();

            document.getElementById('aqPopup').addEventListener('click', (event) => {
                if (event.target.id === 'aqPopup') {
                    closeAqPopup();
                }
            });

            document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
                item.addEventListener('click', (event) => {
                    document.querySelectorAll('.bottom-nav .nav-item').forEach(nav => nav.classList.remove('active'));
                    event.currentTarget.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
