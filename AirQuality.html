<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkopjeYeah - Air Quality</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <div class="brand">
            <span class="brand-mark"><img src="logo.svg" height="60px"></span>
        </div>
        <button onclick="requestUserLocation()" class="location-btn" title="Find My Location">📍</button>
    </header>

    <div id="map"></div>
    <div id="localAqBanner" class="aq-info-notice hidden"></div>

    <div class="aq-details" id="aqDetails">
        <h2 data-i18n="tapMarkerToShow">Tap a marker to show air quality</h2>
        <p data-i18n="selectLocationView">Select a location on the map to view AQI, PM2.5, PM10 and status details.</p>
    </div>

    <div id="aqPopup" class="aq-popup hidden">
        <div class="aq-popup-card full-width-card">
            <div class="sheet-handle"></div>
            <button class="close-modal" onclick="closeAqPopup()">×</button>
            <h3 id="aqPopupTitle">Air Quality Details</h3>
            <div class="aq-popup-summary">
                <div class="aq-value" id="aqPopupValue">--</div>
                <div>
                    <p id="aqPopupStatus" class="aq-popup-status">Loading...</p>
                    <p id="aqPopupUpdate" class="aq-popup-update"></p>
                </div>
            </div>
            <div class="aq-slider-wrapper">
                <input id="aqColorSlider" class="aq-color-slider" type="range" min="0" max="100" value="30" disabled />
                <div class="aq-slider-labels">
                    <span>Good</span>
                    <span>Moderate</span>
                    <span>Poor</span>
                </div>
            </div>
            <ul id="aqPopupList" class="aq-popup-list"></ul>
        </div>
    </div>

  <footer class="bottom-nav">
        <a href="index.html#home" class="nav-item"><span class="nav-icon"><img src="home_ico.svg" alt="Home"></span><span data-i18n="home">Home</span></a>
        <a href="AirQuality.html" class="nav-item"><span class="nav-icon"><img src="air_quality_ico.svg" alt="Air Quality"></span><span data-i18n="airQuality">Air Quality</span></a>
        <a href="Track.html" class="nav-item"><span class="nav-icon"><img src="track_ico.svg" alt="Track"></span><span data-i18n="track">Track</span></a>
        <a href="settings.html" class="nav-item active"><span class="nav-icon"><img src="settings_ico.svg" alt="Settings"></span><span data-i18n="settings">Settings</span></a>
    </footer>


    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="i18n.js" defer></script>
    <script src="airQualityAPI.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.i18n.translateDocument();

            const API_TOKEN = '920a3bd0416aa65f6fde1957372621a3a4013597';
            const defaultCoords = { lat: 41.9981, lng: 21.4254 };
            let userLocation = null;
            const detailsPanel = document.getElementById('aqDetails');
            const localBanner = document.getElementById('localAqBanner');

            const map = L.map('map').setView([defaultCoords.lat, defaultCoords.lng], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            function requestUserLocation() {
                if (!navigator.geolocation) return;
                navigator.geolocation.getCurrentPosition(position => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    map.setView([userLocation.lat, userLocation.lng], 12);
                    L.circleMarker([userLocation.lat, userLocation.lng], {
                        radius: 12,
                        fillColor: '#f44336',
                        color: '#000',
                        weight: 3,
                        fillOpacity: 0.9
                    }).addTo(map).bindPopup('You are here');
                }, error => {
                    console.warn('Geolocation unavailable:', error);
                }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
            }

            // Request notification permission
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            function getAqiStatus(aqi) {
                if (aqi <= 50) return window.i18n.t('good');
                if (aqi <= 100) return window.i18n.t('moderate');
                if (aqi <= 150) return window.i18n.t('unhealthySensitive');
                if (aqi <= 200) return window.i18n.t('unhealthy');
                if (aqi <= 300) return window.i18n.t('veryUnhealthy');
                return window.i18n.t('hazardous');
            }

            function showLoading(message) {
                detailsPanel.innerHTML = `
                    <h2>${window.i18n.t('loadingNearby')}</h2>
                    <p>${message}</p>
                `;
            }

            function setLocalBanner(text, color = '#4caf50') {
                localBanner.textContent = text;
                localBanner.style.backgroundColor = color;
                localBanner.classList.remove('hidden');
            }

            function renderDetails(data) {
                const iaqi = data.data.iaqi || {};
                const components = [];
                const componentNames = {pm25: 'PM2.5', pm10: 'PM10', o3: 'O₃', no2: 'NO₂', so2: 'SO₂', co: 'CO'};

                Object.entries(componentNames).forEach(([key, label]) => {
                    if (iaqi[key]) {
                        components.push(`<li><strong>${label}:</strong> ${iaqi[key].v} ${key === 'co' ? 'mg/m³' : 'µg/m³'}</li>`);
                    }
                });

                detailsPanel.innerHTML = `
                    <h2>${data.data.city.name}</h2>
                    <div class="aq-summary">
                        <span class="aq-value">AQI: ${data.data.aqi}</span>
                        <span>${getAqiStatus(data.data.aqi)}</span>
                    </div>
                    <ul>${components.join('')}</ul>
                    <p><strong>${window.i18n.t('dominentPollutant')}:</strong> ${data.data.dominentpol || 'N/A'}</p>
                    <p><strong>${window.i18n.t('source')}:</strong> ${data.data.attributions ? data.data.attributions.map(a => a.name).join(', ') : 'N/A'}</p>
                `;
            }

            function openAqPopup(data, title) {
                const iaqi = data.data.iaqi || {};
                const componentNames = {pm25: 'PM2.5', pm10: 'PM10', o3: 'O₃', no2: 'NO₂', so2: 'SO₂', co: 'CO'};
                const listItems = Object.entries(componentNames).map(([key,label]) => {
                    if (iaqi[key]) {
                        return `<li><strong>${label}:</strong> ${iaqi[key].v} ${key === 'co' ? 'mg/m³' : 'µg/m³'}</li>`;
                    }
                    return '';
                }).join('');

                document.getElementById('aqPopupTitle').textContent = title;
                document.getElementById('aqPopupValue').textContent = data.data.aqi || '--';
                document.getElementById('aqPopupStatus').textContent = getAqiStatus(data.data.aqi || 0);
                document.getElementById('aqPopupUpdate').textContent = `${window.i18n.t('updated')}: ${data.data.time?.s || 'now'}`;
                document.getElementById('aqPopupList').innerHTML = listItems;
                document.getElementById('aqPopup').classList.remove('hidden');
            }

            function closeAqPopup() {
                document.getElementById('aqPopup').classList.add('hidden');
            }

            async function loadStationDetails(uid, title) {
                showLoading(`${window.i18n.t('fetchingLive')} ${title}...`);
                try {
                    const response = await fetch(`https://api.waqi.info/feed/@${uid}/?token=${API_TOKEN}`);
                    const json = await response.json();
                    if (json.status === 'ok') {
                        openAqPopup(json, title);
                    } else {
                        detailsPanel.innerHTML = `<h2>${title}</h2><p>${window.i18n.t('unavailable')}</p>`;
                        console.error('AQICN feed error', json);
                    }
                } catch (error) {
                    detailsPanel.innerHTML = `<h2>${title}</h2><p>${window.i18n.t('couldNotLoad')}</p>`;
                    console.error('Fetch error', error);
                }
            }

            function getBoundsForCenter(center, distance = 0.12) {
                return `${center.lat - distance},${center.lng - distance},${center.lat + distance},${center.lng + distance}`;
            }

            async function loadStations(center) {
                showLoading(window.i18n.t('loadingNearby'));
                const bounds = center ? getBoundsForCenter(center) : '41.85,21.25,42.10,21.55';
                const url = `https://api.waqi.info/map/bounds?latlng=${bounds}&token=${API_TOKEN}`;
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const json = await response.json();
                    if (json.status !== 'ok' || !json.data) {
                        throw new Error(`Invalid station response: ${json.status}`);
                    }

                    detailsPanel.innerHTML = `<h2>${window.i18n.t('tapMarkerToShow')}</h2><p>${window.i18n.t('selectLocationView')}</p>`;

                    json.data.forEach(station => {
                        const aqi = station.aqi !== '-' ? Number(station.aqi) : null;
                        const marker = L.circleMarker([station.lat, station.lon], {
                            radius: 10,
                            fillColor: aqi === null ? '#999' : aqi > 100 ? '#d95f0e' : '#2a9d8f',
                            color: '#222',
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                        marker.bindPopup(`<strong>${station.station.name}</strong><br>AQI: ${station.aqi}`);
                        marker.on('click', () => loadStationDetails(station.uid, station.station.name));
                    });
                } catch (error) {
                    detailsPanel.innerHTML = `<h2>${window.i18n.t('couldNotLoad')}</h2><p>${window.i18n.t('unavailable')}</p>`;
                    console.error('AQICN error', error);
                }
            }

            async function loadLocalAirQuality(lat, lng) {
                try {
                    const response = await fetch(`https://api.waqi.info/feed/geo:${lat};${lng}/?token=${API_TOKEN}`);
                    const json = await response.json();
                    if (json.status === 'ok') {
                        const aqi = json.data.aqi;
                        const status = getAqiStatus(aqi);
                        const color = aqi <= 50 ? '#4caf50' : aqi <= 100 ? '#ffeb3b' : aqi <= 150 ? '#ff9800' : aqi <= 200 ? '#f44336' : aqi <= 300 ? '#9c27b0' : '#4a148c';
                        setLocalBanner(`${window.i18n.t('airQuality')} near you: ${aqi} (${status})`, color);
                    } else {
                        setLocalBanner(window.i18n.t('unavailable'), '#9e9e9e');
                    }
                } catch (error) {
                    setLocalBanner(window.i18n.t('couldNotLoad'), '#9e9e9e');
                    console.error(error);
                }
            }

            function setMapLocation(lat, lng) {
                map.setView([lat, lng], 13);
                L.circleMarker([lat, lng], {
                    radius: 8,
                    fillColor: '#4caf50',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.9
                }).addTo(map).bindPopup('You are here').openPopup();
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    setMapLocation(userLocation.lat, userLocation.lng);
                    loadStations(userLocation);
                    loadLocalAirQuality(userLocation.lat, userLocation.lng);
                }, () => {
                    loadStations();
                }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
            } else {
                loadStations();
            }

            document.getElementById('aqPopup').addEventListener('click', (event) => {
                if (event.target.id === 'aqPopup') {
                    closeAqPopup();
                }
            });

            document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
                item.addEventListener('click', (event) => {
                    document.querySelectorAll('.bottom-nav .nav-item').forEach(nav => nav.classList.remove('active'));
                    event.currentTarget.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
