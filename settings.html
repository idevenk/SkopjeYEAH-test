<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkopjeYeah - Settings</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js" defer></script>
</head>
<body>
    <header class="top-bar">
        <div class="brand">
            <span class="brand-mark"><img src="logo.svg" height="60px"></span>
        </div>
    </header>
   <main class="settings-page">
        <div class="settings-panel">
            
            <div class="settings-card">
                <h2 data-i18n="language">Language</h2>
                <p data-i18n="selectLanguage">Select your preferred language</p>
                <div class="settings-options">
                    <button class="setting-btn language-btn" onclick="changeLanguage('en')" data-lang="en">
                        <span data-i18n="english">English</span>
                    </button>
                    <button class="setting-btn language-btn" onclick="changeLanguage('mk')" data-lang="mk">
                        <span data-i18n="macedonian">Македонски</span>
                    </button>
                    <button class="setting-btn language-btn" onclick="changeLanguage('sq')" data-lang="sq">
                        <span data-i18n="albanian">Shqip</span>
                    </button>
                </div>
            </div>

            <div class="settings-card">
                <h2 data-i18n="textSize">Text Size</h2>
                <p data-i18n="selectTextSize">Adjust text size for better readability</p>
                <div class="settings-options">
                    <button class="setting-btn size-btn" onclick="changeFontSize('small')" data-size="small">
                        <span data-i18n="small">Small</span>
                    </button>
                    <button class="setting-btn size-btn" onclick="changeFontSize('normal')" data-size="normal">
                        <span data-i18n="normal">Normal</span>
                    </button>
                    <button class="setting-btn size-btn" onclick="changeFontSize('large')" data-size="large">
                        <span data-i18n="large">Large</span>
                    </button>
                    <button class="setting-btn size-btn" onclick="changeFontSize('extra-large')" data-size="extra-large">
                        <span data-i18n="extraLarge">Extra Large</span>
                    </button>
                </div>
            </div>

            <div class="settings-card">
                <h2 data-i18n="officialSignIn">Official Sign In</h2>
                <p data-i18n="enterAccessCode">Enter the official access code to manage report statuses.</p>
                <input id="officialCode" type="password" placeholder="Official code" data-i18n-placeholder="officialCode" />
                <button id="signInBtn" class="primary-btn" onclick="signInOfficial()" data-i18n="signIn">Sign In</button>
                <p id="signInMessage" class="hint-text"></p>
            </div>

            <div id="adminPanel" class="settings-card" style="display:none;">
                <h2 data-i18n="manageReports">Manage Reports</h2>
                <p data-i18n="updateStatus">Update status for submitted reports.</p>
                <div id="reportList"></div>
            </div>
        </div>
    </main>

    <footer class="bottom-nav">
        <a href="index.html#home" class="nav-item"><span class="nav-icon"><img src="home_ico.svg" alt="Home"></span><span data-i18n="home">Home</span></a>
        <a href="AirQuality.html" class="nav-item"><span class="nav-icon"><img src="air_quality_ico.svg" alt="Air Quality"></span><span data-i18n="airQuality">Air Quality</span></a>
        <a href="Track.html" class="nav-item"><span class="nav-icon"><img src="track_ico.svg" alt="Track"></span><span data-i18n="track">Track</span></a>
        <a href="settings.html" class="nav-item active"><span class="nav-icon"><img src="settings_ico.svg" alt="Settings"></span><span data-i18n="settings">Settings</span></a>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_QZc-m7gmNjaOUFm3xAI6c3KCOE4YghU",
            authDomain: "skopjeyeah.firebaseapp.com",
            projectId: "skopjeyeah",
            storageBucket: "skopjeyeah.firebasestorage.app",
            messagingSenderId: "70994576403",
            appId: "1:70994576403:web:b4c20356fae69c69bfebe6",
            measurementId: "G-T2XG7RFMBR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const officialPassword = 'skopjeadmin'; // admin access code: skopjeadmin
        const ADMIN_SIGN_IN_KEY = 'skopjeyeah_admin_signed_in';
        let isOfficial = false;

        function isAdminSignedIn() {
            return localStorage.getItem(ADMIN_SIGN_IN_KEY) === 'true';
        }

        function setAdminSignedIn(value) {
            localStorage.setItem(ADMIN_SIGN_IN_KEY, value ? 'true' : 'false');
            isOfficial = value;
        }

        function signInOfficial() {
            const code = document.getElementById('officialCode').value.trim();
            const message = document.getElementById('signInMessage');
            if (code === officialPassword) {
                setAdminSignedIn(true);
                message.textContent = window.i18n?.t('signedInAsOfficial') || 'Signed in as official. You can manage report statuses.';
                message.style.color = '#2e7d32';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('officialCode').value = '';
                loadReports();
            } else {
                message.textContent = window.i18n?.t('codeIncorrect') || 'Access code is incorrect.';
                message.style.color = '#d32f2f';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (isAdminSignedIn()) {
                setAdminSignedIn(true);
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('signInMessage').textContent = window.i18n?.t('signedInAsOfficial') || 'Signed in as official. You can manage report statuses.';
                document.getElementById('signInMessage').style.color = '#2e7d32';
                loadReports();
            }
        });

        async function loadReports() {
            const reportList = document.getElementById('reportList');
            reportList.innerHTML = '<p class="hint-text">Loading reports...</p>';
            const snapshot = await db.collection('pins').orderBy('timestamp', 'desc').get();
            reportList.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = 'report-card';
                item.innerHTML = `
                    <h2>${data.title || 'Report'}</h2>
                    <p>${data.description || 'No description'}</p>
                    <p>Status: <span class="status-pill">${data.status || 'Reported'}</span></p>
                    <p>${data.tag ? 'Tag: ' + data.tag : ''} ${data.severity ? 'Severity: ' + data.severity + '%' : ''}</p>
                    <div class="report-actions">
                        <select onchange="updateReportStatus('${doc.id}', this.value)">
                            <option value="Reported" ${data.status === 'Reported' ? 'selected' : ''}>Reported</option>
                            <option value="Viewed" ${data.status === 'Viewed' ? 'selected' : ''}>Viewed</option>
                            <option value="Solving" ${data.status === 'Solving' ? 'selected' : ''}>Solving</option>
                            <option value="Solved" ${data.status === 'Solved' ? 'selected' : ''}>Solved</option>
                        </select>
                        ${data.status === 'Solved' && data.type === 'landfill' ? `<button class="status-button" onclick="markEmerging('${doc.id}')">Emerging Again</button>` : ''}
                    </div>
                `;
                reportList.appendChild(item);
            });
            if (!reportList.children.length) {
                reportList.innerHTML = '<p class="hint-text">No reports yet.</p>';
            }
        }

        async function updateReportStatus(id, status) {
            const doc = await db.collection('pins').doc(id).get();
            const data = doc.data();
            const updateData = { status };
            if (status === 'Solved') {
                if (data.type === 'landfill') {
                    updateData.emerging = false;
                } else if (data.type === 'dumpster') {
                    updateData.full = false;
                }
            }
            await db.collection('pins').doc(id).update(updateData);
            loadReports();
        }

        async function markEmerging(id) {
            await db.collection('pins').doc(id).update({ emerging: true });
            loadReports();
        }
    </script>
</body>
</html>
