<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkopjeYeah - Track</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js" defer></script>
</head>
<body>
    <header class="top-bar">
        <div class="brand">
            <span class="brand-mark"><img src="logo.svg" height="60px"></span>
        </div>
        <button onclick="requestUserLocation()" class="location-btn" title="Find My Location">📍</button>
    </header>

    <main class="track-page">
        <section class="track-intro">
            <h1 data-i18n="trackReports">Track Reports</h1>
            <p data-i18n="seeAllCommunity">See all community reports and follow their progress.</p>
        </section>
        <div id="trackList" class="track-list">
            <div class="loading-card">Loading reports...</div>
        </div>
    </main>

      <footer class="bottom-nav">
        <a href="index.html#home" class="nav-item"><span class="nav-icon"><img src="home_ico.svg" alt="Home"></span><span data-i18n="home">Home</span></a>
        <a href="AirQuality.html" class="nav-item"><span class="nav-icon"><img src="air_quality_ico.svg" alt="Air Quality"></span><span data-i18n="airQuality">Air Quality</span></a>
        <a href="Track.html" class="nav-item"><span class="nav-icon"><img src="track_ico.svg" alt="Track"></span><span data-i18n="track">Track</span></a>
        <a href="settings.html" class="nav-item active"><span class="nav-icon"><img src="settings_ico.svg" alt="Settings"></span><span data-i18n="settings">Settings</span></a>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_QZc-m7gmNjaOUFm3xAI6c3KCOE4YghU",
            authDomain: "skopjeyeah.firebaseapp.com",
            projectId: "skopjeyeah",
            storageBucket: "skopjeyeah.firebasestorage.app",
            messagingSenderId: "70994576403",
            appId: "1:70994576403:web:b4c20356fae69c69bfebe6",
            measurementId: "G-T2XG7RFMBR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const REPORTER_ID_STORAGE_KEY = 'skopjeyeah_reporter_id';
        const ADMIN_SIGN_IN_KEY = 'skopjeyeah_admin_signed_in';
        const reporterId = getReporterId();

        function getReporterId() {
            let id = localStorage.getItem(REPORTER_ID_STORAGE_KEY);
            if (!id) {
                id = `reporter-${Math.random().toString(36).slice(2)}-${Date.now()}`;
                localStorage.setItem(REPORTER_ID_STORAGE_KEY, id);
            }
            return id;
        }

        function isAdminSignedIn() {
            return localStorage.getItem(ADMIN_SIGN_IN_KEY) === 'true';
        }

        function statusToProgress(status) {
            if (!status) return 24;
            const map = {
                'Reported': 30,
                'Viewed': 55,
                'Resolving': 72,
                'Resolved': 100,
                'Solved': 100,
            };
            return map[status] || 45;
        }

        function isResolvedOrSolvedStatus(status) {
            return status === 'Resolved' || status === 'Solved';
        }

        function cleanupOldResolvedReports() {
            const thirtyDaysAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;
            db.collection('pins').where('status', 'in', ['Resolved', 'Solved']).get()
                .then(snapshot => {
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const timestamp = data.timestamp && data.timestamp.seconds ? data.timestamp.seconds * 1000 : new Date(data.timestamp).getTime();
                        if (timestamp && timestamp < thirtyDaysAgo) {
                            if (data.status === 'Solved' && data.type === 'landfill' && !data.emerging) {
                                doc.ref.delete().catch(error => console.error('Unable to delete old solved landfill report:', error));
                            } else if (data.status === 'Resolved') {
                                doc.ref.delete().catch(error => console.error('Unable to delete old resolved report:', error));
                            }
                        }
                    });
                })
                .catch(error => console.error('Error cleaning old resolved reports:', error));
        }

        function renderTrackCard(report) {
            const progress = statusToProgress(report.status);
            return `
                <article class="track-card">
                    <h3>${report.title} • ${report.description}</h3>
                    <div class="status-bar">
                        <div class="status-fill" style="width: ${progress}%;"></div>
                    </div>
                    <div class="track-meta">
                        <span>${report.status || 'Reported'}</span>
                        <span>${new Date(report.timestamp?.seconds ? report.timestamp.seconds * 1000 : report.timestamp).toLocaleString()}</span>
                    </div>
                </article>
            `;
        }

        function loadReports() {
            const list = document.getElementById('trackList');
            db.collection('pins').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                if (snapshot.empty) {
                    list.innerHTML = '<div class="loading-card" data-i18n="noReports">No reports yet.</div>';
                    window.i18n?.translateDocument(list);
                    return;
                }

                let docs = snapshot.docs;
                if (!isAdminSignedIn()) {
                    docs = docs.filter(doc => doc.data().reporterId === reporterId);
                }

                if (docs.length === 0) {
                    list.innerHTML = '<div class="loading-card" data-i18n="noReports">No reports yet.</div>';
                    window.i18n?.translateDocument(list);
                    return;
                }

                const html = docs.map(doc => {
                    const data = doc.data();
                    return renderTrackCard(data);
                }).join('');

                list.innerHTML = html;
                window.i18n?.translateDocument(list);
            }, error => {
                list.innerHTML = '<div class="loading-card" data-i18n="unableToLoadReports">Unable to load reports.</div>';
                window.i18n?.translateDocument(list);
                console.error(error);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.i18n?.translateDocument();
            cleanupOldResolvedReports();
            loadReports();
        });
    </script>
</body>
</html>
